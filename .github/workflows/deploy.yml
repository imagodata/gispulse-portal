name: Build and publish portal dist

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-branch
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portal
        uses: actions/checkout@v4
        with:
          path: portal

      - name: Checkout engine (for design-system tokens)
        uses: actions/checkout@v4
        with:
          repository: imagodata/gispulse
          path: engine

      - name: Symlink design-system as sibling of portal
        run: ln -sfn engine/design-system design-system

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: portal
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: portal
        run: npm run build

      - name: Publish dist to 'deploy' branch
        working-directory: portal/dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -b deploy
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "build: ${GITHUB_SHA::7} ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" deploy:deploy
