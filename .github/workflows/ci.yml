name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portal
        uses: actions/checkout@v5
        with:
          path: portal

      - name: Checkout engine (for design-system sibling)
        uses: actions/checkout@v5
        with:
          repository: imagodata/gispulse
          path: engine

      - name: Symlink design-system as sibling of portal
        run: ln -sfn engine/design-system design-system

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        working-directory: portal
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        working-directory: portal
        run: npx tsc --noEmit

      - name: Build
        working-directory: portal
        run: npm run build
