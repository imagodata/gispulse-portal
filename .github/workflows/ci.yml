name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `tsc --noEmit` against the root tsconfig.json (files: [], references)
      # type-checks nothing — it was a silent no-op. `tsc -b` builds the
      # referenced projects (app + node) so the check actually gates.
      - name: TypeScript check
        run: pnpm exec tsc -b

      - name: Build
        run: pnpm build

  lint:
    # Non-blocking ESLint job — measures the lint-debt backlog
    # (estimated ~126 errors / 18 warnings post Wave 1, audit_deep_portails_2026_04_29).
    # Drives toward zero across Realign 2.0 sprint (PR P2, P3, P4).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint (non-blocking)
        run: pnpm exec eslint . || true
